<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Book cover -->
  <rect x="6" y="4" width="20" height="24" rx="1" fill="#2c3e50"/>
  
  <!-- Book spine -->
  <rect x="6" y="4" width="3" height="24" rx="1" fill="#34495e"/>
  
  <!-- Pages -->
  <rect x="9" y="6" width="15" height="20" fill="#ecf0f1"/>
  
  <!-- Cross on cover -->
  <rect x="15" y="8" width="2" height="8" fill="#e74c3c"/>
  <rect x="13" y="11" width="6" height="2" fill="#e74c3c"/>
  
  <!-- Page lines -->
  <rect x="11" y="9" width="11" height="0.5" fill="#bdc3c7"/>
  <rect x="11" y="11" width="11" height="0.5" fill="#bdc3c7"/>
  <rect x="11" y="13" width="11" height="0.5" fill="#bdc3c7"/>
  <rect x="11" y="15" width="8" height="0.5" fill="#bdc3c7"/>
</svg>